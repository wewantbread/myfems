<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Sacred Element Cycle</title>
  <style>
    :root {
      --text: hsl(0 0% 14%);
      --muted: hsla(0 0% 16% / 0.85);
      --line: hsla(0 0% 18% / 0.2);
      --card-bg: hsla(0 0% 100% / 0.42);
      --card-bg-active: hsla(0 0% 100% / 0.64);
      --panel-bg: hsla(0 0% 100% / 0.62);
      --accent: hsl(0 0% 18%);
      --xaza-hue: 0deg;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 44%, hsl(0 0% 100%) 0%, hsl(0 0% 96%) 38%, hsl(0 0% 90%) 100%),
        linear-gradient(180deg, hsl(0 0% 98%) 0%, hsl(0 0% 92%) 100%);
      overflow-x: hidden;
      position: relative;
      transition: color 0.35s ease, background 0.35s ease;
    }

    body[data-theme="night"] {
      --text: hsl(0 0% 92%);
      --muted: hsla(0 0% 88% / 0.88);
      --line: hsla(0 0% 70% / 0.26);
      --card-bg: hsla(0 0% 16% / 0.5);
      --card-bg-active: hsla(0 0% 24% / 0.65);
      --panel-bg: hsla(0 0% 10% / 0.7);
      --accent: hsl(0 0% 92%);
      background: #000;
    }

    .xaza-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: url("logomiupv2dude.png") center/cover no-repeat;
      opacity: 0.66;
      --bg-breathe-opacity: 0.66;
      filter: hue-rotate(var(--logo-hue, 0deg));
      animation: bg-breathe 6s ease-in-out infinite;
      transition: filter 0.7s ease, opacity 0.5s ease;
    }

    .molecule-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: url("chuuchmolecule.png") center/cover no-repeat;
      opacity: 0.4;
      --bg-breathe-opacity: 0.4;
      filter: hue-rotate(var(--molecule-hue, 0deg));
      animation: bg-breathe 8s ease-in-out infinite reverse;
      transition: filter 0.7s ease, opacity 0.5s ease;
    }

    body[data-theme="night"] .xaza-bg { opacity: 0.58; }
    body[data-theme="night"] .molecule-bg { opacity: 0.36; }

    .pixel-wave {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(circle at 50% 46%, hsla(0 0% 100% / 0.18) 0%, transparent 70%);
    }

    .page {
      position: relative;
      z-index: 3;
      width: min(1160px, 95vw);
      margin: 1.2rem auto 2rem;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .back-home {
      width: 2.35rem;
      height: 2.35rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      text-decoration: none;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--card-bg);
      transition: transform 180ms ease, background 180ms ease;
      font-size: 1.25rem;
      line-height: 1;
    }

    .back-home:hover,
    .back-home:focus-visible {
      transform: translateY(-2px);
      background: var(--card-bg-active);
      outline: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 4vw, 2.7rem);
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .theme-toggle {
      position: relative;
      width: 62px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--card-bg);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      transition: background 220ms ease;
      color: var(--text);
    }

    .theme-toggle::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 0.3rem 0.8rem rgba(0, 0, 0, 0.25);
      transition: transform 220ms ease, background 220ms ease;
    }

    body[data-theme="night"] .theme-toggle::after {
      transform: translateX(28px);
      background: #dce8ff;
    }

    .theme-toggle__icon {
      position: relative;
      z-index: 1;
      font-size: 0.85rem;
      opacity: 0.86;
      user-select: none;
    }

    .collections {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .collection-button {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card-bg);
      color: var(--text);
      text-align: left;
      padding: 1rem;
      min-height: 96px;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: transform 190ms ease, background 190ms ease, box-shadow 190ms ease;
    }

    .collection-button:hover,
    .collection-button:focus-visible,
    .collection-button.is-active {
      transform: translateY(-3px);
      background: var(--card-bg-active);
      box-shadow: 0 0.7rem 1.7rem rgba(6, 20, 16, 0.25);
      outline: none;
    }

    .collection-button h2 {
      margin: 0 0 0.4rem;
      font-size: 1.03rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--accent);
    }

    .collection-button p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .items-panel {
      margin-top: 1rem;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel-bg);
      padding: 1rem;
      backdrop-filter: blur(8px);
      min-height: 320px;
      animation: riseIn 360ms ease;
    }

    .panel-title {
      margin: 0 0 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 1rem;
      color: var(--accent);
    }

    .empty-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.8rem;
    }

    .media-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card-bg);
      overflow: hidden;
      cursor: pointer;
      color: var(--text);
      text-align: left;
      padding: 0;
      transition: transform 180ms ease, background 180ms ease;
    }

    .media-item:hover,
    .media-item:focus-visible {
      transform: translateY(-2px);
      background: var(--card-bg-active);
      outline: none;
    }

    .media-item img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #101010;
    }

    .media-item__meta {
      padding: 0.52rem 0.62rem 0.66rem;
    }

    .media-item__meta strong {
      display: block;
      font-size: 0.88rem;
      margin-bottom: 0.2rem;
      letter-spacing: 0.01em;
    }

    .media-item__meta span {
      display: block;
      font-size: 0.77rem;
      line-height: 1.3;
      color: var(--muted);
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 1rem;
      background: rgba(3, 10, 9, 0.78);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox__panel {
      width: min(92vw, 900px);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(6, 20, 16, 0.95);
      transform: scale(0.88);
      transition: transform 240ms ease;
    }

    .lightbox.open .lightbox__panel { transform: scale(1); }

    .lightbox__panel img {
      width: 100%;
      max-height: min(72vh, 760px);
      object-fit: contain;
      display: block;
      background: #010302;
    }

    .lightbox__meta {
      display: flex;
      justify-content: space-between;
      gap: 0.85rem;
      align-items: center;
      padding: 0.72rem 0.9rem;
      color: #d5d5d5;
      font-size: 0.9rem;
    }

    .lightbox button {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: #f1f1f1;
      padding: 0.36rem 0.75rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-size: 0.75rem;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.85rem;
    }

    .panel-header .panel-title {
      margin: 0;
    }

    .view-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card-bg);
      color: var(--text);
      padding: 0.28rem 0.72rem;
      cursor: pointer;
      font-size: 0.78rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      transition: background 180ms ease, transform 180ms ease;
      flex-shrink: 0;
    }

    .view-toggle:hover,
    .view-toggle:focus-visible {
      background: var(--card-bg-active);
      transform: translateY(-1px);
      outline: none;
    }

    .view-toggle__icon {
      font-size: 1rem;
      line-height: 1;
    }

    /* List-view overrides applied when .view-list is on .media-grid */
    .media-grid.view-list {
      grid-template-columns: 1fr;
      gap: 0.45rem;
    }

    /* 5×5 grid view */
    .media-grid.view-grid5 {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 0.35rem;
    }

    .media-grid.view-grid5 .media-item__meta {
      display: none;
    }

    @media (max-width: 980px) {
      .media-grid.view-grid5 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .media-grid.view-grid5 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    .media-grid.view-list .media-item {
      display: flex;
      flex-direction: row;
      align-items: center;
      border-radius: 10px;
    }

    .media-grid.view-list .media-item img {
      width: 96px;
      height: 72px;
      aspect-ratio: unset;
      flex-shrink: 0;
      object-fit: cover;
      border-radius: 9px 0 0 9px;
    }

    .media-grid.view-list .media-item__meta {
      padding: 0.45rem 0.75rem;
    }

    @keyframes bg-breathe {
      0%, 100% { transform: scale(1); opacity: var(--bg-breathe-opacity, 0.66); }
      50% { transform: scale(1.018); opacity: calc(var(--bg-breathe-opacity, 0.66) + 0.06); }
    }

    @keyframes riseIn {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 980px) {
      .media-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 900px) {
      .collections { grid-template-columns: 1fr; }
      .items-panel { min-height: 260px; }
      .topbar { align-items: flex-start; }
    }

    @media (max-width: 640px) {
      .media-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="xaza-bg" aria-hidden="true"></div>
  <div class="molecule-bg" aria-hidden="true"></div>
  <canvas class="pixel-wave" aria-hidden="true"></canvas>

  <main class="page">
    <header class="topbar">
      <div class="topbar-left">
        <a class="back-home" href="index.html" aria-label="Back home" title="Back home">↩</a>
        <h1>Gallery Collections</h1>
      </div>
      <button class="theme-toggle" type="button" aria-label="Toggle day and night mode">
        <span class="theme-toggle__icon" aria-hidden="true">☀️</span>
        <span class="theme-toggle__icon" aria-hidden="true">🌙</span>
      </button>
    </header>

    <section class="collections" aria-label="Collection selector">
      <button class="collection-button is-active" type="button" data-collection="veg">
        <h2>Veg</h2>
        <p>Click to view collection</p>
      </button>
      <button class="collection-button" type="button" data-collection="flower">
        <h2>Flower</h2>
        <p>Click to view all submitted photos</p>
      </button>
    </section>

    <section class="items-panel" id="items-panel" aria-live="polite"></section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox__panel">
      <img id="lightbox-image" src="" alt="Selected gallery image" />
      <div class="lightbox__meta">
        <span id="lightbox-desc"></span>
        <button type="button" id="close-lightbox">Close</button>
      </div>
    </div>
  </div>

  <script>
    const body = document.body;
    const root = document.documentElement;
    const pixelWave = document.querySelector(".pixel-wave");

    const storedTheme = window.localStorage.getItem("chakra-theme");
    if (storedTheme === "night" || (!storedTheme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
      body.dataset.theme = "night";
    }

    document.querySelector(".theme-toggle")?.addEventListener("click", () => {
      const isNight = body.dataset.theme === "night";
      const nextTheme = isNight ? "day" : "night";
      if (nextTheme === "night") {
        body.dataset.theme = "night";
      } else {
        delete body.dataset.theme;
      }
      window.localStorage.setItem("chakra-theme", nextTheme);
    });

    const collections = {
      veg: {
        title: "Veg",
        items: [],
        empty: "No photos are assigned to Veg right now."
      },
      flower: {
        title: "Flower",
        items: [
          { file: "fb2s1.jpg", label: "fb2s1.jpg", desc: "Flower image from your first set" },
          { file: "fb2s1v2.jpg", label: "fb2s1v2.jpg", desc: "Flower image from your first set" },
          { file: "fb2s1v3.jpg", label: "fb2s1v3.jpg", desc: "Flower image from your first set" },
          { file: "fb2s1v4.jpg", label: "fb2s1v4.jpg", desc: "Flower image from your first set" },
          { file: "IMG_3364.jpeg", label: "IMG_3364.jpeg", desc: "Flower image from your additional upload" },
          { file: "IMG_3566.jpeg", label: "IMG_3566.jpeg", desc: "Flower image from your additional upload" },
          { file: "IMG_3568.jpeg", label: "IMG_3568.jpeg", desc: "Flower image from your additional upload" },
          { file: "IMG_3569.jpeg", label: "IMG_3569.jpeg", desc: "Flower image from your additional upload" },
          { file: "IMG_3571.jpeg", label: "IMG_3571.jpeg", desc: "Flower image from your additional upload" },
          { file: "IMG_3588.jpeg", label: "IMG_3588.jpeg", desc: "Flower image from your additional upload" },
          { file: "IMG_6703.jpeg", label: "IMG_6703.jpeg", desc: "Flower image from your latest upload" },
          { file: "IMG_6707.jpeg", label: "IMG_6707.jpeg", desc: "Flower image from your latest upload" },
          { file: "IMG_6709.jpeg", label: "IMG_6709.jpeg", desc: "Flower image from your latest upload" },
          { file: "IMG_6710.jpeg", label: "IMG_6710.jpeg", desc: "Flower image from your latest upload" }
        ]
      }
    };

    const panel = document.getElementById("items-panel");
    const buttons = Array.from(document.querySelectorAll(".collection-button"));
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightbox-image");
    const lightboxDesc = document.getElementById("lightbox-desc");
    const closeButton = document.getElementById("close-lightbox");

    let viewMode = window.localStorage.getItem("gallery-view") || "grid";
    if (!["grid", "list", "grid5"].includes(viewMode)) viewMode = "grid";

    const getToggleLabel = () => {
      if (viewMode === "grid") return `<span class="view-toggle__icon">☰</span> List`;
      if (viewMode === "list") return `<span class="view-toggle__icon">⊡</span> 5×5`;
      return `<span class="view-toggle__icon">⊞</span> Grid`;
    };

    const applyViewMode = (grid) => {
      if (!grid) return;
      grid.classList.toggle("view-list", viewMode === "list");
      grid.classList.toggle("view-grid5", viewMode === "grid5");
    };

    const renderCollection = (key) => {
      const config = collections[key];
      if (!config) return;

      buttons.forEach((btn) => {
        btn.classList.toggle("is-active", btn.dataset.collection === key);
      });

      const heading = `
        <div class="panel-header">
          <h2 class="panel-title">${config.title} Collection</h2>
          <button class="view-toggle" type="button" id="view-toggle" aria-label="Toggle list or grid view">
            ${getToggleLabel()}
          </button>
        </div>`;

      if (!config.items.length) {
        panel.innerHTML = `${heading}<p class="empty-note">${config.empty}</p>`;
        return;
      }

      const itemsMarkup = config.items
        .map((item, index) => `
          <button class="media-item" type="button" data-file="${item.file}" data-desc="${item.desc}">
            <img src="${item.file}" alt="${item.label}" loading="lazy" />
            <div class="media-item__meta">
              <strong>${index + 1}. ${item.label}</strong>
              <span>${item.desc}</span>
            </div>
          </button>
        `)
        .join("");

      panel.innerHTML = `${heading}<div class="media-grid" id="media-grid">${itemsMarkup}</div>`;

      applyViewMode(panel.querySelector(".media-grid"));

      document.getElementById("view-toggle")?.addEventListener("click", () => {
        viewMode = viewMode === "grid" ? "list" : viewMode === "list" ? "grid5" : "grid";
        window.localStorage.setItem("gallery-view", viewMode);
        const grid = panel.querySelector(".media-grid");
        applyViewMode(grid);
        const btn = document.getElementById("view-toggle");
        if (btn) btn.innerHTML = getToggleLabel();
      });

      panel.querySelectorAll(".media-item").forEach((node) => {
        node.addEventListener("click", () => {
          lightboxImage.src = node.dataset.file;
          lightboxDesc.textContent = `${node.querySelector("strong")?.textContent || "Image"} — ${node.dataset.desc || ""}`;
          lightbox.classList.add("open");
          lightbox.setAttribute("aria-hidden", "false");
        });
      });
    };

    buttons.forEach((button) => {
      button.addEventListener("click", () => renderCollection(button.dataset.collection));
    });

    const closeLightbox = () => {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
    };

    closeButton.addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) closeLightbox();
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && lightbox.classList.contains("open")) closeLightbox();
    });

    renderCollection("veg");

    const randomBetween = (min, max) => Math.random() * (max - min) + min;

    const initializeHueLoop = () => {
      const setLogoHue = (value) => root.style.setProperty("--logo-hue", `${value}deg`);
      const setMoleculeHue = (value) => root.style.setProperty("--molecule-hue", `${value}deg`);
      setLogoHue(0);
      setMoleculeHue(0);
      window.setInterval(() => {
        setLogoHue(randomBetween(0, 360).toFixed(1));
      }, 3000);
      window.setInterval(() => {
        setMoleculeHue(randomBetween(0, 360).toFixed(1));
      }, 10000);
    };

    const initPixelWave = () => {
      if (!pixelWave) return;
      const context = pixelWave.getContext("2d");
      if (!context) return;

      const buffer = document.createElement("canvas");
      const bufferContext = buffer.getContext("2d");
      if (!bufferContext) return;

      const points = [];
      const trailLifetime = 1400;
      const spawnDelay = 40;
      const pixelScale = 10;
      const maxPoints = 220;
      let lastSpawn = 0;

      const resize = () => {
        const { innerWidth, innerHeight, devicePixelRatio } = window;
        pixelWave.width = innerWidth * devicePixelRatio;
        pixelWave.height = innerHeight * devicePixelRatio;
        pixelWave.style.width = `${innerWidth}px`;
        pixelWave.style.height = `${innerHeight}px`;
        buffer.width = Math.ceil(innerWidth / pixelScale);
        buffer.height = Math.ceil(innerHeight / pixelScale);
        context.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      };

      const addPoint = (x, y, time) => {
        points.push({ x, y, time });
        if (points.length > maxPoints) {
          points.splice(0, points.length - maxPoints);
        }
      };

      const handlePointerMove = (event) => {
        const now = performance.now();
        if (now - lastSpawn >= spawnDelay) {
          addPoint(event.clientX, event.clientY, now);
          lastSpawn = now;
        }
      };

      const draw = (time) => {
        bufferContext.clearRect(0, 0, buffer.width, buffer.height);
        bufferContext.fillStyle = "rgba(255, 255, 255, 0.35)";
        const activePoints = [];

        points.forEach((point) => {
          const age = time - point.time;
          if (age > trailLifetime) return;
          const progress = age / trailLifetime;
          const wave = Math.sin(progress * Math.PI * 2) * 2.2;
          const size = 1.4 + progress * 2.6;
          const alpha = (1 - progress) * 0.45;
          const x = point.x / pixelScale;
          const y = (point.y + wave * pixelScale) / pixelScale;
          bufferContext.globalAlpha = alpha;
          bufferContext.fillRect(x - size / 2, y - size / 2, size, size);
          activePoints.push(point);
        });

        points.length = 0;
        points.push(...activePoints);

        context.clearRect(0, 0, window.innerWidth, window.innerHeight);
        context.imageSmoothingEnabled = false;
        context.globalCompositeOperation = "screen";
        context.drawImage(buffer, 0, 0, buffer.width, buffer.height, 0, 0, window.innerWidth, window.innerHeight);
        context.globalCompositeOperation = "source-over";
        window.requestAnimationFrame(draw);
      };

      resize();
      window.addEventListener("resize", resize);
      window.addEventListener("pointermove", handlePointerMove);
      window.addEventListener("pointerdown", handlePointerMove);
      window.requestAnimationFrame(draw);
    };

    initializeHueLoop();
    initPixelWave();
  </script>
</body>
</html>
